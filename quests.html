<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quests | SideQuests</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="quests-page">

  <main class="quest-app">

    <header class="quest-header">
      <div class="top-actions">
        <a href="post.html" class="post-quest-btn">+ Post a Quest</a>
      </div>

      <a href="index.html" class="back-link">← SideQuests</a>

      <h1>Available Quests</h1>

      <p>
        Ranked by reward, speed, distance, difficulty, weirdness, and trust.
      </p>
    </header>

    <section class="filters">
      <button class="filter active">Best Match</button>
      <button class="filter">Highest $</button>
      <button class="filter">Fastest</button>
      <button class="filter">Closest</button>
      <button class="filter">Weirdest</button>
      <button class="filter">Low Effort</button>
    </section>

    <section class="rank-metrics">
      <div><strong>$ / hr</strong><span>Reward efficiency</span></div>
      <div><strong>Distance</strong><span>Nearby first</span></div>
      <div><strong>Difficulty</strong><span>Easy to hard</span></div>
      <div><strong>Trust</strong><span>Poster score</span></div>
    </section>

    <section class="quest-feed"></section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL =
      "https://ukuotipwjapezhrettmv.supabase.co";

    const SUPABASE_ANON_KEY =
      "sb_publishable_QoFMOZhWjyNkFWnJfnazAQ_PZ0GMh4G";

    const supabaseClient =
      supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );

    const filters =
      document.querySelectorAll('.filter');

    const feed =
      document.querySelector('.quest-feed');

    let quests = [];

    let viewerLatitude = null;
    let viewerLongitude = null;

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;

      const dLat =
        (lat2 - lat1) * Math.PI / 180;

      const dLon =
        (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) *
        Math.sin(dLat / 2)
        +
        Math.cos(lat1 * Math.PI / 180)
        *
        Math.cos(lat2 * Math.PI / 180)
        *
        Math.sin(dLon / 2)
        *
        Math.sin(dLon / 2);

      const c =
        2 * Math.atan2(
          Math.sqrt(a),
          Math.sqrt(1 - a)
        );

      return R * c;
    }

    function getQuestDistance(quest) {
      if (
        viewerLatitude !== null &&
        viewerLongitude !== null &&
        quest.latitude !== null &&
        quest.longitude !== null
      ) {
        return calculateDistance(
          viewerLatitude,
          viewerLongitude,
          Number(quest.latitude),
          Number(quest.longitude)
        );
      }

      return null;
    }

    function getDistanceText(quest) {
      const distance =
        getQuestDistance(quest);

      if (distance === null) {
        return "Distance unknown";
      }

      return `${distance.toFixed(1)} km`;
    }

    async function fetchQuests() {
      const { data, error } =
        await supabaseClient
          .from('quests')
          .select('*')
          .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        feed.innerHTML =
          `<p>Could not load quests.</p>`;
        return;
      }

      quests = data || [];

      renderQuests(quests);
    }

    function renderQuests(data) {
      feed.innerHTML = '';

      if (!data || data.length === 0) {
        feed.innerHTML =
          `<p>No quests posted yet. Be the first.</p>`;
        return;
      }

      data.forEach((quest, index) => {
        const card =
          document.createElement('article');

        card.className =
          `quest-list-card ${index === 0 ? 'top' : ''}`;

        card.innerHTML = `
          <div class="quest-rank">
            #${index + 1}
          </div>

          <div class="quest-info">

            <div class="quest-meta">
              <span>$${quest.reward}</span>

              <span>
                ${quest.time_minutes} min
              </span>

              <span>
                ${getDistanceText(quest)}
              </span>

              <span class="urgency-tag">
                ${quest.urgency || 'WHENEVER'}
              </span>
            </div>

            <h2>${quest.title}</h2>

            <p>${quest.description}</p>

            <div class="quest-tags">
              <span>
                ${quest.category || 'Quest'}
              </span>

              <span>
                Weirdness:
                ${quest.weirdness || 5}/10
              </span>
            </div>

          </div>

          <button
            class="claim-btn"
            onclick="toggleQuestDetails(this)"
          >
            View Details
          </button>

          <div class="inline-details">
            <h3>
              What success looks like
            </h3>

            <ul>
              <li>
                Complete the quest exactly as described.
              </li>

              <li>
                Confirm completion with the poster.
              </li>

              <li>
                Show up on time.
              </li>
            </ul>

            <div class="activity-box mini">
              <div class="activity-item">
                👀
                ${Math.floor(Math.random() * 8) + 2}
                people viewed this recently
              </div>

              <div class="activity-item">
                📍
                ${quest.location || 'Unknown Location'}
              </div>

              <div class="activity-item">
                📏
                ${getDistanceText(quest)}
              </div>

              <div class="activity-item">
                ⚡
                Urgency:
                ${quest.urgency || 'WHENEVER'}
              </div>
            </div>

            <button
  class="accept-main small"
  onclick="openQuestChat('${quest.id}', '${quest.user_id}')"
>
  Message Poster
</button>
          </div>
        `;

        feed.appendChild(card);
      });
    }

    function toggleQuestDetails(button) {
      const card =
        button.closest('.quest-list-card');

      card.classList.toggle('expanded');

      button.innerText =
        card.classList.contains('expanded')
          ? 'Hide Details'
          : 'View Details';
    }

    function sortByBestMatch(a, b) {
      const aDistance =
        getQuestDistance(a) || 5;

      const bDistance =
        getQuestDistance(b) || 5;

      return (
        (
          (b.reward * 0.35) +
          (b.weirdness * 0.25) -
          (bDistance * 0.10) -
          (b.effort * 0.15)
        )
        -
        (
          (a.reward * 0.35) +
          (a.weirdness * 0.25) -
          (aDistance * 0.10) -
          (a.effort * 0.15)
        )
      );
    }

let currentChatId = null;
let chatSubscription = null;

async function openQuestChat(questId, posterId) {

  const {
    data: { user }
  } = await supabaseClient.auth.getUser();

  if (!user) {
    alert("Please log in first.");
    return;
  }

  if (user.id === posterId) {
    alert("You cannot message yourself.");
    return;
  }

  const { data: existingChat } =
    await supabaseClient
      .from('quest_chats')
      .select('*')
      .eq('quest_id', questId)
      .eq('poster_id', posterId)
      .eq('quester_id', user.id)
      .maybeSingle();

  if (existingChat) {
    currentChatId = existingChat.id;
  }

  else {

    const { data: newChat, error } =
      await supabaseClient
        .from('quest_chats')
        .insert({
          quest_id: questId,
          poster_id: posterId,
          quester_id: user.id
        })
        .select()
        .single();

    if (error) {
      console.error(error);
      alert("Could not create chat.");
      return;
    }

    currentChatId = newChat.id;
  }

  openChatUI();

  loadMessages();

  subscribeToChatMessages();
}

function openChatUI() {

  let existing =
    document.getElementById('chat-overlay');

  if (existing) return;

  const chat =
    document.createElement('div');

  chat.id = 'chat-overlay';

  chat.innerHTML = `
    <div class="chat-window">

      <div class="chat-header">
        Quest Chat
      </div>

      <div id="messages" class="messages"></div>

      <div class="chat-input-row">
        <input
          id="chatInput"
          placeholder="Type a message..."
        />

        <button onclick="sendMessage()">
          Send
        </button>
      </div>

    </div>
  `;

  document.body.appendChild(chat);
}

async function loadMessages() {

  if (!currentChatId) return;

  const { data, error } =
    await supabaseClient
      .from('quest_messages')
      .select('*')
      .eq('chat_id', currentChatId)
      .order('created_at', {
        ascending: true
      });

  if (error) {
    console.error(error);
    return;
  }

  const messages =
    document.getElementById('messages');

  messages.innerHTML =
    data.map(msg => `
      <div class="message">
        ${msg.message}
      </div>
    `).join('');

  messages.scrollTop =
    messages.scrollHeight;
}

async function sendMessage() {

  const input =
    document.getElementById('chatInput');

  const message =
    input.value.trim();

  if (!message) return;

  const {
    data: { user }
  } = await supabaseClient.auth.getUser();

  const { error } =
    await supabaseClient
      .from('quest_messages')
      .insert({
        chat_id: currentChatId,
        sender_id: user.id,
        message
      });

  if (error) {
    console.error(error);
    return;
  }

  input.value = '';
}

function subscribeToChatMessages() {

  if (chatSubscription) {
    supabaseClient.removeChannel(
      chatSubscription
    );
  }

  chatSubscription =
    supabaseClient
      .channel(
        'chat-' + currentChatId
      )
      .on(
        'postgres_changes',
        {
          event: 'INSERT',
          schema: 'public',
          table: 'quest_messages',
          filter:
            `chat_id=eq.${currentChatId}`
        },
        () => {
          loadMessages();
        }
      )
      .subscribe();
}

    navigator.geolocation.getCurrentPosition(
      (position) => {
        viewerLatitude =
          position.coords.latitude;

        viewerLongitude =
          position.coords.longitude;

        fetchQuests();
      },
      () => {
        fetchQuests();
      }
    );

    filters.forEach(filter => {
      filter.addEventListener('click', () => {
        filters.forEach(btn =>
          btn.classList.remove('active'));

        filter.classList.add('active');

        const type =
          filter.innerText;

        let sorted =
          [...quests];

        if (type === 'Highest $') {
          sorted.sort((a, b) =>
            b.reward - a.reward);
        }

        else if (type === 'Fastest') {
          sorted.sort((a, b) =>
            a.time_minutes - b.time_minutes);
        }

        else if (type === 'Closest') {
          sorted.sort((a, b) =>
            (getQuestDistance(a) || 999)
            -
            (getQuestDistance(b) || 999)
          );
        }

        else if (type === 'Weirdest') {
          sorted.sort((a, b) =>
            b.weirdness - a.weirdness);
        }

        else if (type === 'Low Effort') {
          sorted.sort((a, b) =>
            a.effort - b.effort);
        }

        else {
          sorted.sort(sortByBestMatch);
        }

        renderQuests(sorted);
      });
    });
  </script>

</body>
</html>
