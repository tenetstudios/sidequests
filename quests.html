<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quests | SideQuests</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="quests-page">

  <main class="quest-app">

    <header class="quest-header">
      <div class="top-actions">
        <a href="post.html" class="post-quest-btn">+ Post a Quest</a>
      </div>

      <a href="index.html" class="back-link">← SideQuests</a>

      <h1>Available Quests</h1>

      <p>
        Ranked by rewards, speed, distance, difficulty, weirdness, and trust.
      </p>
    </header>

    <section class="filters">
      <button class="filter active">Best Match</button>
      <button class="filter">Highest $</button>
      <button class="filter">Fastest</button>
      <button class="filter">Closest</button>
      <button class="filter">Weirdest</button>
      <button class="filter">Low Effort</button>
    </section>

    <section class="rank-metrics">
      <div><strong>$ / hr</strong><span>Reward efficiency</span></div>
      <div><strong>Distance</strong><span>Nearby first</span></div>
      <div><strong>Difficulty</strong><span>Easy to hard</span></div>
      <div><strong>Trust</strong><span>Poster score</span></div>
    </section>

    <section class="quest-feed"></section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

  const SUPABASE_URL =
    "PASTE_YOUR_SUPABASE_URL_HERE";

  const SUPABASE_ANON_KEY =
    "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";

  const supabaseClient =
    supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

  const filters =
    document.querySelectorAll('.filter');

  const feed =
    document.querySelector('.quest-feed');

  let quests = [];

  async function fetchQuests() {

    const { data, error } =
      await supabaseClient
        .from('quests')
        .select('*');

    if (error) {

      console.error(error);

      return;

    }

    quests = data;

    renderQuests(quests);

  }

  function renderQuests(data) {

    feed.innerHTML = '';

    data.forEach((quest, index) => {

      const card =
        document.createElement('article');

      card.className =
        `quest-list-card ${index === 0 ? 'top' : ''}`;

      card.innerHTML = `

        <div class="quest-rank">
          #${index + 1}
        </div>

        <div class="quest-info">

          <div class="quest-meta">

            <span>$${quest.reward}</span>

            <span>
              ${quest.time_minutes} min
            </span>

            <span>
              ${quest.distance || 1} km
            </span>

            <span class="urgency-tag">
              ${quest.urgency || 'WHENEVER'}
            </span>

          </div>

          <h2>${quest.title}</h2>

          <p>${quest.description}</p>

          <div class="quest-tags">

            <span>
              ${quest.category || 'Quest'}
            </span>

            <span>
              Weirdness:
              ${quest.weirdness || 5}/10
            </span>

          </div>

        </div>

        <button
          class="claim-btn"
          onclick="toggleQuestDetails(this)"
        >
          View Details
        </button>

        <div class="inline-details">

          <h3>
            What success looks like
          </h3>

          <ul>
            <li>
              Complete the quest exactly as described.
            </li>

            <li>
              Confirm completion with the poster.
            </li>

            <li>
              Show up on time.
            </li>
          </ul>

          <div class="activity-box mini">

            <div class="activity-item">
              👀
              ${Math.floor(Math.random() * 8) + 2}
              people viewed this recently
            </div>

            <div class="activity-item">
              📍
              ${quest.location || 'Unknown Location'}
            </div>

            <div class="activity-item">
              ⚡
              Urgency:
              ${quest.urgency || 'WHENEVER'}
            </div>

          </div>

          <button class="accept-main small">
            Accept Quest
          </button>

        </div>

      `;

      feed.appendChild(card);

    });

  }

  function toggleQuestDetails(button) {

    const card =
      button.closest('.quest-list-card');

    card.classList.toggle('expanded');

    button.innerText =
      card.classList.contains('expanded')
      ? 'Hide Details'
      : 'View Details';

  }

  fetchQuests();

  filters.forEach(filter => {

    filter.addEventListener('click', () => {

      filters.forEach(btn =>
        btn.classList.remove('active'));

      filter.classList.add('active');

      const type =
        filter.innerText;

      let sorted =
        [...quests];

      if (type === 'Highest $') {

        sorted.sort((a, b) =>
          b.reward - a.reward);

      }

      else if (type === 'Fastest') {

        sorted.sort((a, b) =>
          a.time_minutes - b.time_minutes);

      }

      else if (type === 'Closest') {

        sorted.sort((a, b) =>
          (a.distance || 1)
          -
          (b.distance || 1));

      }

      else if (type === 'Weirdest') {

        sorted.sort((a, b) =>
          b.weirdness - a.weirdness);

      }

      else if (type === 'Low Effort') {

        sorted.sort((a, b) =>
          a.effort - b.effort);

      }

      else {

        sorted.sort((a, b) =>

          (
            (b.reward * 0.35)
            +
            (b.weirdness * 0.25)
            -
            ((b.distance || 1) * 0.10)
            -
            (b.effort * 0.15)
          )

          -

          (
            (a.reward * 0.35)
            +
            (a.weirdness * 0.25)
            -
            ((a.distance || 1) * 0.10)
            -
            (a.effort * 0.15)
          )

        );

      }

      renderQuests(sorted);

    });

  });

</script>

</body>
</html>
