<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quests | SideQuests</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="quests-page">

  <main class="quest-app">

    <header class="quest-header">

      <div class="top-actions">
        <a href="post.html" class="post-quest-btn">
          + Post a Quest
        </a>
      </div>

      <a href="index.html" class="back-link">← SideQuests</a>

      <h1>Available Quests</h1>

      <p>
        Ranked by reward, speed, distance, difficulty, weirdness, and trust.
      </p>

    </header>

    <section class="filters">
      <button class="filter active">Best Match</button>
      <button class="filter">Highest $</button>
      <button class="filter">Fastest</button>
      <button class="filter">Closest</button>
      <button class="filter">Weirdest</button>
      <button class="filter">Low Effort</button>
    </section>

    <section class="rank-metrics">
      <div><strong>$ / hr</strong><span>Reward efficiency</span></div>
      <div><strong>Distance</strong><span>Nearby first</span></div>
      <div><strong>Difficulty</strong><span>Easy to hard</span></div>
      <div><strong>Trust</strong><span>Poster score</span></div>
    </section>

    <section class="quest-feed"></section>

  </main>

  <script>

    const filters = document.querySelectorAll('.filter');
    const feed = document.querySelector('.quest-feed');

    const quests = [

      {
        reward: 25,
        time: 15,
        distance: 0.8,
        weirdness: 7,
        effort: 2,
        title: "Hype me up before my first date",
        description: "Need someone to give me a 5-minute confidence speech outside the restaurant.",
        tags: ["Low effort", "Funny", "High $/hr"]
      },

      {
        reward: 40,
        time: 45,
        distance: 2.1,
        weirdness: 10,
        effort: 4,
        title: "Need fake paparazzi for a birthday entrance",
        description: "Show up with phones/cameras and act like my friend is famous.",
        tags: ["Group quest", "Viral", "Weird"]
      },

      {
        reward: 15,
        time: 10,
        distance: 0.4,
        weirdness: 5,
        effort: 1,
        title: "Teach me how to do a cartwheel",
        description: "Must be patient. I am extremely unathletic.",
        tags: ["Fast", "Nearby", "Skill"]
      },

      {
        reward: 60,
        time: 120,
        distance: 5.5,
        weirdness: 2,
        effort: 8,
        title: "Help me move a couch upstairs",
        description: "One couch. Third floor. I will provide pizza.",
        tags: ["Physical", "Higher pay", "Useful"]
      }

    ];

    function renderQuests(data) {

      feed.innerHTML = '';

      data.forEach((quest, index) => {

        const card = document.createElement('article');

        card.className =
          `quest-list-card ${index === 0 ? 'top' : ''}`;

        card.innerHTML = `

          <div class="quest-rank">#${index + 1}</div>

          <div class="quest-info">

            <div class="quest-meta">
              <span>$${quest.reward}</span>
              <span>${quest.time} min</span>
              <span>${quest.distance} km</span>
            </div>

            <h2>${quest.title}</h2>

            <p>${quest.description}</p>

            <div class="quest-tags">
              ${quest.tags.map(tag =>
                `<span>${tag}</span>`).join('')}
            </div>

          </div>

          <a href="quest-detail.html" class="claim-btn">
            Accept
          </a>

        `;

        feed.appendChild(card);

      });

    }

    renderQuests(quests);

    filters.forEach(filter => {

      filter.addEventListener('click', () => {

        filters.forEach(btn =>
          btn.classList.remove('active'));

        filter.classList.add('active');

        const type = filter.innerText;

        let sorted = [...quests];

        if (type === 'Highest $') {
          sorted.sort((a, b) => b.reward - a.reward);
        }

        else if (type === 'Fastest') {
          sorted.sort((a, b) => a.time - b.time);
        }

        else if (type === 'Closest') {
          sorted.sort((a, b) => a.distance - b.distance);
        }

        else if (type === 'Weirdest') {
          sorted.sort((a, b) => b.weirdness - a.weirdness);
        }

        else if (type === 'Low Effort') {
          sorted.sort((a, b) => a.effort - b.effort);
        }

        else {

          sorted.sort((a, b) =>

            (
              (b.reward * 0.35)
              +
              (b.weirdness * 0.25)
              -
              (b.distance * 0.10)
              -
              (b.effort * 0.15)
            )

            -

            (
              (a.reward * 0.35)
              +
              (a.weirdness * 0.25)
              -
              (a.distance * 0.10)
              -
              (a.effort * 0.15)
            )

          );

        }

        renderQuests(sorted);

      });

    });

  </script>

</body>
</html>
